<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechNova - Iniciar Sesión</title>
    <style>
        /* ===== NUEVA PALETA DE COLORES PREMIUM ===== */
        :root {
            --color-primary: #E07D00;
            --color-secondary: #1E1E2A;
            --color-background: #F9F9FB;
            --color-card-bg: #FFFFFF;
            --color-text-secondary: #6B7280;
            --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.06);
            --border-radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: var(--color-background);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background-color: var(--color-card-bg);
            border-radius: 32px;
            width: 100%;
            max-width: 440px;
            padding: 48px 40px;
            box-shadow: var(--shadow-soft);
            border: 1px solid #F3F4F6;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 36px;
            font-weight: 700;
            color: var(--color-secondary);
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .logo h1 span {
            color: var(--color-primary);
        }

        .logo p {
            font-size: 14px;
            color: var(--color-text-secondary);
        }

        .welcome-message {
            text-align: center;
            margin-bottom: 32px;
        }

        .welcome-message h2 {
            font-size: 22px;
            font-weight: 600;
            color: var(--color-secondary);
            margin-bottom: 4px;
        }

        .welcome-message p {
            font-size: 14px;
            color: var(--color-text-secondary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--color-secondary);
            margin-bottom: 6px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #E5E7EB;
            border-radius: var(--border-radius);
            padding: 12px 16px;
            background-color: var(--color-card-bg);
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(224, 125, 0, 0.1);
        }

        .input-icon {
            margin-right: 12px;
            font-size: 18px;
            color: var(--color-text-secondary);
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            font-family: inherit;
            background: transparent;
        }

        .input-wrapper input::placeholder {
            color: #9CA3AF;
        }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 14px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--color-text-secondary);
            cursor: pointer;
        }

        .checkbox-label input {
            width: 16px;
            height: 16px;
            accent-color: var(--color-primary);
            cursor: pointer;
        }

        .forgot-link {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .forgot-link:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            background-color: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
        }

        .login-btn:hover {
            background-color: #C96E00;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(224, 125, 0, 0.3);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background-color: #E5E7EB;
        }

        .divider span {
            background-color: var(--color-card-bg);
            padding: 0 16px;
            position: relative;
            color: var(--color-text-secondary);
            font-size: 13px;
        }

        .register-link {
            text-align: center;
        }

        .register-link a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: opacity 0.2s;
        }

        .register-link a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .register-link p {
            color: var(--color-text-secondary);
            font-size: 13px;
            margin-top: 6px;
        }

        .error-message {
            background-color: #FEF2F2;
            color: #DC2626;
            padding: 12px;
            border-radius: var(--border-radius);
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            border: 1px solid #FECACA;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Tech<span>Nova</span></h1>
            <p>Tecnología que transforma</p>
        </div>

        <div class="welcome-message">
            <h2>Bienvenido de vuelta</h2>
            <p>Inicia sesión para continuar</p>
        </div>

        <form action="/login" method="post">
            <div class="form-group">
                <label>Correo electrónico</label>
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" name="email" placeholder="tucorreo@ejemplo.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="options-row">
                <label class="checkbox-label">
                    <input type="checkbox" name="recordar"> Recordar sesión
                </label>
                <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="login-btn">Iniciar sesión</button>
        </form>

        <div class="divider">
            <span>¿No tienes cuenta?</span>
        </div>

        <div class="register-link">
            <a href="#">Crear cuenta nueva</a>
            <p>Regístrate y empieza a comprar</p>
        </div>

        <div th:if="${error}" class="error-message" th:text="${error}"></div>
    </div>
</body>
</html>
